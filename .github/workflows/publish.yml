name: Publish — npm & VS Code Marketplace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ─── Build & Validate Before Publishing ────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm --filter logscale-mcp-server lint
      - run: pnpm --filter logscale-mcp-server test:coverage
      - run: pnpm -r build

  # ─── Publish Server to npm ────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter logscale-mcp-server build
      - name: Publish logscale-mcp-server to npm
        run: |
          cd packages/server
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
