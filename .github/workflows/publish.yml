name: Publish — npm & VS Code Marketplace

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write          # Required for npm provenance (OIDC trusted publishers)

jobs:
  # ─── Build & Validate Before Publishing ────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm --filter logscale-mcp-server lint
      - run: pnpm --filter logscale-mcp-server test:coverage
      - run: pnpm -r build

  # ─── Publish Server to npm ────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    environment: npm       # Must match the environment in npmjs trusted publisher config
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter logscale-mcp-server build
      - name: Publish logscale-mcp-server to npm
        run: |
          cd packages/server
          npm publish --provenance --access public
      - name: Upload npm debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/*.log
          retention-days: 7
