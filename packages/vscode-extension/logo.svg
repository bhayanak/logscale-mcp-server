<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Magnifying glass circle -->
  <circle cx="108" cy="108" r="56" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

  <!-- Magnifying glass handle -->
  <line x1="149" y1="149" x2="195" y2="195" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>

  <!-- Log lines inside magnifying glass -->
  <line x1="76" y1="88" x2="126" y2="88" stroke="#4ecca3" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="76" y1="105" x2="140" y2="105" stroke="#4ecca3" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <line x1="76" y1="122" x2="116" y2="122" stroke="#4ecca3" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- MCP connection nodes (bottom-left) -->
  <circle cx="42" cy="200" r="9" fill="#e94560" opacity="0.9"/>
  <circle cx="78" cy="220" r="9" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="114" cy="200" r="9" fill="#e94560" opacity="0.9"/>

  <!-- MCP connection lines -->
  <line x1="42" y1="200" x2="78" y2="220" stroke="#e94560" stroke-width="3" opacity="0.6"/>
  <line x1="78" y1="220" x2="114" y2="200" stroke="#e94560" stroke-width="3" opacity="0.6"/>

  <!-- Terminal cursor (chevron shape instead of text) -->
  <polyline points="170,200 185,213 170,226" fill="none" stroke="#4ecca3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <line x1="192" y1="226" x2="210" y2="226" stroke="#4ecca3" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
</svg>
