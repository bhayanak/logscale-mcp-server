<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bg)"/>

  <!-- Magnifying glass circle -->
  <circle cx="112" cy="112" r="56" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

  <!-- Magnifying glass handle -->
  <line x1="153" y1="153" x2="195" y2="195" stroke="url(#accent)" stroke-width="10" stroke-linecap="round"/>

  <!-- Log lines inside magnifying glass -->
  <line x1="80" y1="92" x2="130" y2="92" stroke="#4ecca3" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <line x1="80" y1="107" x2="144" y2="107" stroke="#4ecca3" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="80" y1="122" x2="120" y2="122" stroke="#4ecca3" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- MCP connection dots (bottom-left) -->
  <circle cx="48" cy="200" r="8" fill="#e94560" opacity="0.9"/>
  <circle cx="80" cy="216" r="8" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="112" cy="200" r="8" fill="#e94560" opacity="0.9"/>

  <!-- MCP connection lines -->
  <line x1="48" y1="200" x2="80" y2="216" stroke="#e94560" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="216" x2="112" y2="200" stroke="#e94560" stroke-width="3" opacity="0.6"/>

  <!-- Cursor/prompt bracket -->
  <text x="178" y="230" font-family="monospace" font-size="48" font-weight="bold" fill="#4ecca3" opacity="0.85">&gt;_</text>
</svg>
